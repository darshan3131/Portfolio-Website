<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2e1a1a"/>
      <stop offset="100%" stop-color="#1a0d0d"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg)" rx="20"/>
  <!-- Git logo diamond -->
  <rect x="72" y="72" width="56" height="56" rx="8" fill="#f05032" transform="rotate(45 100 100)"/>
  <!-- Git branch symbol inside -->
  <!-- Vertical line -->
  <line x1="100" y1="74" x2="100" y2="116" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- Circle top -->
  <circle cx="100" cy="72" r="7" fill="white"/>
  <!-- Circle bottom left -->
  <circle cx="83" cy="116" r="7" fill="white"/>
  <!-- Circle bottom right -->
  <circle cx="117" cy="116" r="7" fill="white"/>
  <!-- Branch line -->
  <path d="M 100 88 Q 117 88 117 108" stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/>
  <text x="100" y="178" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#f05032" text-anchor="middle">GIT</text>
</svg>
