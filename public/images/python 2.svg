<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a30"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </radialGradient>
    <linearGradient id="snake1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3776ab"/>
      <stop offset="100%" stop-color="#4b8bbe"/>
    </linearGradient>
    <linearGradient id="snake2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd43b"/>
      <stop offset="100%" stop-color="#ffe873"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg)" rx="20"/>
  <!-- Python logo - two interlocked snakes -->
  <!-- Blue snake (top) -->
  <path d="M 100 45 Q 85 45 78 52 L 78 80 Q 78 88 86 88 L 114 88 Q 122 88 122 96 L 122 108 Q 122 116 114 116 L 86 116 Q 78 116 78 124 L 78 140 Q 78 148 86 152 L 100 155" fill="url(#snake1)"/>
  <!-- Yellow snake (bottom) -->
  <path d="M 100 155 Q 115 155 122 148 L 122 120 Q 122 112 114 112 L 86 112 Q 78 112 78 104 L 78 92 Q 78 84 86 84 L 114 84 Q 122 84 122 76 L 122 60 Q 122 52 114 48 L 100 45" fill="url(#snake2)"/>
  <!-- Blue dot -->
  <circle cx="90" cy="60" r="5" fill="#fff" opacity="0.9"/>
  <!-- Yellow dot -->
  <circle cx="110" cy="140" r="5" fill="#fff" opacity="0.9"/>
  <text x="100" y="185" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffd43b" text-anchor="middle">PYTHON</text>
</svg>
