      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a18"/>
    </radialGradient>
    <radialGradient id="brain" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7b5ea7"/>
      <stop offset="100%" stop-color="#5a3d8a"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg)" rx="20"/>
  <!-- Brain outline -->
  <path d="M 100 45 Q 115 42 125 50 Q 145 48 148 65 Q 160 68 158 85 Q 165 92 160 105 Q 162 118 150 125 Q 148 140 135 143 Q 128 155 115 152 L 100 155 L 85 152 Q 72 155 65 143 Q 52 140 50 125 Q 38 118 40 105 Q 35 92 42 85 Q 40 68 52 65 Q 55 48 75 50 Q 85 42 100 45 Z" fill="url(#brain)" opacity="0.9"/>
  <!-- Brain texture lines -->
  <path d="M 80 60 Q 100 55 120 60" stroke="#9b7ec7" stroke-width="2" fill="none"/>
  <path d="M 68 78 Q 85 70 100 72 Q 115 70 132 78" stroke="#9b7ec7" stroke-width="2" fill="none"/>
  <path d="M 65 95 Q 82 88 100 90 Q 118 88 135 95" stroke="#9b7ec7" stroke-width="2" fill="none"/>
  <path d="M 68 112 Q 85 106 100 108 Q 115 106 132 112" stroke="#9b7ec7" stroke-width="2" fill="none"/>
  <path d="M 75 128 Q 90 123 100 124 Q 110 123 125 128" stroke="#9b7ec7" stroke-width="2" fill="none"/>
  <!-- Neural nodes glowing -->
  <circle cx="100" cy="90" r="6" fill="#00d4ff" opacity="0.9"/>
  <circle cx="78" cy="85" r="4" fill="#00d4ff" opacity="0.7"/>
  <circle cx="122" cy="85" r="4" fill="#00d4ff" opacity="0.7"/>
  <circle cx="68" cy="105" r="3" fill="#00d4ff" opacity="0.5"/>
  <circle cx="132" cy="105" r="3" fill="#00d4ff" opacity="0.5"/>
  <circle cx="88" cy="115" r="4" fill="#7b5ea7" opacity="0.8"/>
  <circle cx="112" cy="115" r="4" fill="#7b5ea7" opacity="0.8"/>
  <!-- Connections -->
  <line x1="100" y1="90" x2="78" y2="85" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="90" x2="122" y2="85" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="78" y1="85" x2="68" y2="105" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  <line x1="122" y1="85" x2="132" y2="105" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  <line x1="68" y1="105" x2="88" y2="115" stroke="#7b5ea7" stroke-width="1" opacity="0.4"/>
  <line x1="132" y1="105" x2="112" y2="115" stroke="#7b5ea7" stroke-width="1" opacity="0.4"/>
  <text x="100" y="180" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#00d4ff" text-anchor="middle">Gen AI</text>
