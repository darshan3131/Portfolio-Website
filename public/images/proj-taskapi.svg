<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080810"/>
      <stop offset="100%" stop-color="#0a1520"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Terminal/code window -->
  <rect x="30" y="30" width="320" height="260" rx="10" fill="#0d0d1a" stroke="#333" stroke-width="1.5"/>
  <!-- Window bar -->
  <rect x="30" y="30" width="320" height="32" rx="10" fill="#1a1a2e"/>
  <rect x="30" y="48" width="320" height="14" fill="#1a1a2e"/>
  <circle cx="52" cy="46" r="6" fill="#ff5f57"/>
  <circle cx="72" cy="46" r="6" fill="#ffbd2e"/>
  <circle cx="92" cy="46" r="6" fill="#28ca41"/>
  <text x="150" y="50" font-family="monospace" font-size="11" fill="#666" text-anchor="middle">Task Management API</text>
  <!-- Code content -->
  <text x="48" y="84" font-family="monospace" font-size="10" fill="#7b5ea7">@RestController</text>
  <text x="48" y="100" font-family="monospace" font-size="10" fill="#4ade80">@RequestMapping<tspan fill="#fff">("/api/tasks")</tspan></text>
  <text x="48" y="116" font-family="monospace" font-size="10" fill="#7b5ea7">public class <tspan fill="#fbbf24">TaskController</tspan> <tspan fill="#fff">{</tspan></text>
  <text x="60" y="136" font-family="monospace" font-size="10" fill="#7b5ea7">  @GetMapping</text>
  <text x="60" y="152" font-family="monospace" font-size="10" fill="#4ade80">  @PreAuthorize<tspan fill="#fff">("hasRole('USER')")</tspan></text>
  <text x="60" y="168" font-family="monospace" font-size="10" fill="#60a5fa">  public <tspan fill="#fbbf24">ResponseEntity</tspan><tspan fill="#fff">&lt;List&lt;Task&gt;&gt;</tspan></text>
  <text x="60" y="184" font-family="monospace" font-size="10" fill="#60a5fa">  getTasks<tspan fill="#fff">() {</tspan></text>
  <text x="72" y="200" font-family="monospace" font-size="10" fill="#fff">    return <tspan fill="#60a5fa">taskService</tspan>.findAll();</text>
  <text x="60" y="216" font-family="monospace" font-size="10" fill="#fff">  }</text>
  <text x="48" y="232" font-family="monospace" font-size="10" fill="#fff">}</text>
  <!-- JWT badge -->
  <rect x="48" y="252" width="46" height="22" rx="11" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1"/>
  <text x="71" y="266" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle">JWT</text>
  <rect x="100" y="252" width="70" height="22" rx="11" fill="#6db33f" opacity="0.2" stroke="#6db33f" stroke-width="1"/>
  <text x="135" y="266" font-family="Arial, sans-serif" font-size="9" fill="#6db33f" text-anchor="middle">Spring Sec</text>
  <rect x="176" y="252" width="58" height="22" rx="11" fill="#00d4ff" opacity="0.2" stroke="#00d4ff" stroke-width="1"/>
  <text x="205" y="266" font-family="Arial, sans-serif" font-size="9" fill="#00d4ff" text-anchor="middle">Swagger</text>
  <!-- REST endpoints panel -->
  <rect x="375" y="30" width="200" height="260" rx="10" fill="#0d0d1a" stroke="#333" stroke-width="1.5"/>
  <text x="475" y="58" font-family="monospace" font-size="11" fill="#666" text-anchor="middle">Endpoints</text>
  <!-- Endpoint rows -->
  <rect x="390" y="68" width="170" height="28" rx="5" fill="#1a2e1a"/>
  <text x="400" y="86" font-family="monospace" font-size="10" fill="#4ade80">GET</text>
  <text x="430" y="86" font-family="monospace" font-size="10" fill="#aaa">/api/tasks</text>
  <rect x="390" y="102" width="170" height="28" rx="5" fill="#1a2a3e"/>
  <text x="400" y="120" font-family="monospace" font-size="10" fill="#60a5fa">POST</text>
  <text x="435" y="120" font-family="monospace" font-size="10" fill="#aaa">/api/tasks</text>
  <rect x="390" y="136" width="170" height="28" rx="5" fill="#2e2a1a"/>
  <text x="400" y="154" font-family="monospace" font-size="10" fill="#fbbf24">PUT</text>
  <text x="430" y="154" font-family="monospace" font-size="10" fill="#aaa">/api/tasks/{`{id}`}</text>
  <rect x="390" y="170" width="170" height="28" rx="5" fill="#2e1a1a"/>
  <text x="400" y="188" font-family="monospace" font-size="10" fill="#f87171">DELETE</text>
  <text x="452" y="188" font-family="monospace" font-size="10" fill="#aaa">/api/tasks/{`{id}`}</text>
  <rect x="390" y="204" width="170" height="28" rx="5" fill="#1a2a3e"/>
  <text x="400" y="222" font-family="monospace" font-size="10" fill="#60a5fa">POST</text>
  <text x="435" y="222" font-family="monospace" font-size="10" fill="#aaa">/auth/login</text>
  <!-- DB icon -->
  <rect x="418" y="248" width="68" height="30" rx="6" fill="#00758f" opacity="0.3" stroke="#00758f" stroke-width="1"/>
  <text x="452" y="268" font-family="Arial, sans-serif" font-size="10" fill="#00d4ff" text-anchor="middle">MySQL</text>
  <!-- Title -->
  <text x="30" y="330" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="white" opacity="0.1">TASK API</text>
  <text x="30" y="358" font-family="Arial, sans-serif" font-size="14" fill="#00d4ff">REST API · Backend</text>
  <text x="30" y="382" font-family="Arial, sans-serif" font-size="11" fill="#666">Java 17 · Spring Boot 3 · JWT · Spring Security · MySQL</text>
</svg>
