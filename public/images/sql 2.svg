<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg)" rx="20"/>
  <!-- MySQL Dolphin simplified / DB cylinders -->
  <!-- Top cylinder -->
  <ellipse cx="100" cy="60" rx="38" ry="12" fill="#00758f"/>
  <rect x="62" y="60" width="76" height="35" fill="#00758f"/>
  <ellipse cx="100" cy="95" rx="38" ry="12" fill="#00758f"/>
  <!-- Middle cylinder -->
  <ellipse cx="100" cy="95" rx="38" ry="12" fill="#1a9ab8"/>
  <rect x="62" y="95" width="76" height="30" fill="#1a9ab8"/>
  <ellipse cx="100" cy="125" rx="38" ry="12" fill="#1a9ab8"/>
  <!-- Highlights -->
  <ellipse cx="100" cy="60" rx="38" ry="12" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="100" cy="95" rx="38" ry="12" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="100" cy="125" rx="38" ry="12" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
  <!-- Data lines on cylinders -->
  <line x1="78" y1="72" x2="122" y2="72" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="78" y1="80" x2="122" y2="80" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="78" y1="106" x2="122" y2="106" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="78" y1="114" x2="122" y2="114" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <text x="100" y="158" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#00758f" text-anchor="middle">MySQL</text>
  <text x="100" y="178" font-family="Arial, sans-serif" font-size="13" fill="#00d4ff" text-anchor="middle">SQL</text>
</svg>
