<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080810"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2a5e"/>
      <stop offset="100%" stop-color="#0d1a3a"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0080c0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Grid background -->
  <g opacity="0.05" stroke="#00d4ff" stroke-width="1">
    <line x1="0" y1="50" x2="600" y2="50"/><line x1="0" y1="100" x2="600" y2="100"/>
    <line x1="0" y1="150" x2="600" y2="150"/><line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="250" x2="600" y2="250"/><line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="0" y1="350" x2="600" y2="350"/>
    <line x1="60" y1="0" x2="60" y2="400"/><line x1="120" y1="0" x2="120" y2="400"/>
    <line x1="180" y1="0" x2="180" y2="400"/><line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/><line x1="360" y1="0" x2="360" y2="400"/>
    <line x1="420" y1="0" x2="420" y2="400"/><line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="540" y1="0" x2="540" y2="400"/>
  </g>
  <!-- Credit card 1 (background) -->
  <rect x="60" y="80" width="220" height="140" rx="14" fill="url(#card1)" opacity="0.8"/>
  <rect x="60" y="80" width="220" height="140" rx="14" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
  <rect x="75" y="110" width="38" height="28" rx="4" fill="#f0b520" opacity="0.8"/>
  <text x="82" y="170" font-family="monospace" font-size="13" fill="white" opacity="0.8" letter-spacing="2">4512 •••• •••• 8834</text>
  <text x="75" y="200" font-family="monospace" font-size="10" fill="#00d4ff" opacity="0.7">DARSHAN SIDDARTH</text>
  <!-- Credit card 2 (front) -->
  <rect x="120" y="130" width="220" height="140" rx="14" fill="url(#card2)"/>
  <rect x="120" y="130" width="220" height="140" rx="14" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  <circle cx="310" cy="175" r="28" fill="white" opacity="0.15"/>
  <circle cx="290" cy="175" r="28" fill="white" opacity="0.1"/>
  <text x="135" y="185" font-family="monospace" font-size="13" fill="white" letter-spacing="2">•••• •••• •••• 4291</text>
