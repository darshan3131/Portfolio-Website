  <text x="530" y="84" font-family="monospace" font-size="9" fill="#888">Kafka</text>
  <rect x="370" y="100" width="200" height="30" rx="6" fill="#0d1a3a" opacity="0.8" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="382" y="119" font-family="monospace" font-size="10" fill="#f87171">- ₹3,200.00</text>
  <text x="530" y="119" font-family="monospace" font-size="9" fill="#888">Redis</text>
  <rect x="370" y="135" width="200" height="30" rx="6" fill="#0d1a3a" opacity="0.8" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="382" y="154" font-family="monospace" font-size="10" fill="#4ade80">+ ₹8,750.00</text>
  <text x="530" y="154" font-family="monospace" font-size="9" fill="#888">TiDB</text>
  <rect x="370" y="170" width="200" height="30" rx="6" fill="#0d1a3a" opacity="0.8" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="382" y="189" font-family="monospace" font-size="10" fill="#f87171">- ₹1,100.00</text>
  <text x="530" y="189" font-family="monospace" font-size="9" fill="#888">Twilio</text>
  <!-- Spring Boot badge -->
  <rect x="370" y="230" width="90" height="26" rx="13" fill="#6db33f" opacity="0.9"/>
  <text x="415" y="247" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Spring Boot</text>
  <rect x="468" y="230" width="56" height="26" rx="13" fill="#1a3a4a" stroke="#00d4ff" stroke-width="1"/>
  <text x="496" y="247" font-family="Arial, sans-serif" font-size="10" fill="#00d4ff" text-anchor="middle">Java 17</text>
  <!-- Title -->
  <text x="40" y="310" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" fill="white" opacity="0.15">PAYLEDGER</text>
  <text x="40" y="350" font-family="Arial, sans-serif" font-size="14" fill="#00d4ff">Enterprise Payment System</text>
  <text x="40" y="375" font-family="Arial, sans-serif" font-size="11" fill="#666">Java 17 · Spring Boot 3 · Kafka · Redis · TiDB · React 18</text>
