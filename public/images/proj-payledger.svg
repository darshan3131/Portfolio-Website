  <!-- Transaction flow -->
  <text x="400" y="55" font-family="Arial, sans-serif" font-size="11" fill="#00d4ff" opacity="0.6">TRANSACTION LEDGER</text>
  <!-- Tx items -->
  <rect x="370" y="65" width="200" height="30" rx="6" fill="#0d1a3a" opacity="0.8" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.3"/>
