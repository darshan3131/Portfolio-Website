<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08080f"/>
      <stop offset="100%" stop-color="#080f18"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Agent network visualization -->
  <!-- Connection lines first (behind nodes) -->
  <line x1="300" y1="120" x2="160" y2="210" stroke="#00d4ff" stroke-width="1.5" opacity="0.4" stroke-dasharray="6,3"/>
  <line x1="300" y1="120" x2="300" y2="220" stroke="#00d4ff" stroke-width="1.5" opacity="0.4" stroke-dasharray="6,3"/>
  <line x1="300" y1="120" x2="440" y2="210" stroke="#00d4ff" stroke-width="1.5" opacity="0.4" stroke-dasharray="6,3"/>
  <line x1="160" y1="210" x2="130" y2="300" stroke="#7b5ea7" stroke-width="1.5" opacity="0.4" stroke-dasharray="6,3"/>
  <line x1="160" y1="210" x2="240" y2="300" stroke="#7b5ea7" stroke-width="1.5" opacity="0.4" stroke-dasharray="6,3"/>
  <line x1="300" y1="220" x2="370" y2="300" stroke="#7b5ea7" stroke-width="1.5" opacity="0.4" stroke-dasharray="6,3"/>
  <line x1="440" y1="210" x2="480" y2="300" stroke="#7b5ea7" stroke-width="1.5" opacity="0.4" stroke-dasharray="6,3"/>
  <!-- START node -->
  <rect x="265" y="55" width="70" height="36" rx="18" fill="#1a2e1a" stroke="#4ade80" stroke-width="2"/>
  <text x="300" y="77" font-family="monospace" font-size="11" fill="#4ade80" text-anchor="middle">START</text>
  <line x1="300" y1="91" x2="300" y2="110" stroke="#4ade80" stroke-width="2"/>
  <polygon points="296,110 300,120 304,110" fill="#4ade80"/>
  <!-- Orchestrator node -->
  <circle cx="300" cy="120" r="32" fill="#1a1030" stroke="#00d4ff" stroke-width="2.5"/>
  <text x="300" y="115" font-family="monospace" font-size="9" fill="#00d4ff" text-anchor="middle">Orchestr-</text>
  <text x="300" y="128" font-family="monospace" font-size="9" fill="#00d4ff" text-anchor="middle">ator</text>
  <!-- Sub-agent nodes -->
  <circle cx="160" cy="210" r="28" fill="#1a1030" stroke="#7b5ea7" stroke-width="2"/>
  <text x="160" y="205" font-family="monospace" font-size="8" fill="#9b7ec7" text-anchor="middle">Research</text>
  <text x="160" y="218" font-family="monospace" font-size="8" fill="#9b7ec7" text-anchor="middle">Agent</text>
  <circle cx="300" cy="220" r="28" fill="#1a1030" stroke="#7b5ea7" stroke-width="2"/>
  <text x="300" y="215" font-family="monospace" font-size="8" fill="#9b7ec7" text-anchor="middle">Writer</text>
  <text x="300" y="228" font-family="monospace" font-size="8" fill="#9b7ec7" text-anchor="middle">Agent</text>
  <circle cx="440" cy="210" r="28" fill="#1a1030" stroke="#7b5ea7" stroke-width="2"/>
  <text x="440" y="205" font-family="monospace" font-size="8" fill="#9b7ec7" text-anchor="middle">Review</text>
  <text x="440" y="218" font-family="monospace" font-size="8" fill="#9b7ec7" text-anchor="middle">Agent</text>
  <!-- Tool nodes -->
  <rect x="100" y="286" width="60" height="28" rx="6" fill="#0a1520" stroke="#00d4ff" stroke-width="1" opacity="0.8"/>
  <text x="130" y="304" font-family="monospace" font-size="8" fill="#00d4ff" text-anchor="middle">Web Search</text>
  <rect x="210" y="286" width="60" height="28" rx="6" fill="#0a1520" stroke="#00d4ff" stroke-width="1" opacity="0.8"/>
  <text x="240" y="304" font-family="monospace" font-size="8" fill="#00d4ff" text-anchor="middle">LLM Tool</text>
  <rect x="340" y="286" width="60" height="28" rx="6" fill="#0a1520" stroke="#00d4ff" stroke-width="1" opacity="0.8"/>
  <text x="370" y="304" font-family="monospace" font-size="8" fill="#00d4ff" text-anchor="middle">Validator</text>
  <rect x="452" y="286" width="56" height="28" rx="6" fill="#0a1520" stroke="#00d4ff" stroke-width="1" opacity="0.8"/>
  <text x="480" y="304" font-family="monospace" font-size="8" fill="#00d4ff" text-anchor="middle">OpenAI</text>
  <!-- END node -->
  <rect x="265" y="330" width="70" height="30" rx="15" fill="#2e1a1a" stroke="#f87171" stroke-width="2"/>
  <text x="300" y="350" font-family="monospace" font-size="11" fill="#f87171" text-anchor="middle">END</text>
  <line x1="300" y1="314" x2="300" y2="328" stroke="#f87171" stroke-width="1.5"/>
  <polygon points="296,325 300,330 304,325" fill="#f87171"/>
  <!-- LangGraph label -->
  <text x="30" y="50" font-family="Arial Black, sans-serif" font-size="18" font-weight="900" fill="#00d4ff" opacity="0.8">LangGraph</text>
  <text x="30" y="70" font-family="Arial, sans-serif" font-size="11" fill="#666">Agent Orchestration Framework</text>
  <!-- Bottom title -->
  <text x="30" y="368" font-family="Arial, sans-serif" font-size="14" fill="#00d4ff">GenAI · Agent Orchestration</text>
  <text x="30" y="390" font-family="Arial, sans-serif" font-size="11" fill="#666">Python · LangGraph · FastAPI · OpenAI API</text>
</svg>
