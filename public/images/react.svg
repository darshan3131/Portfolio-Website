<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="16" fill="#20232a"/>
  <!-- React atom logo -->
  <!-- Center nucleus -->
  <circle cx="50" cy="50" r="5" fill="#61DAFB"/>
  <!-- Orbit 1 - horizontal ellipse -->
  <ellipse cx="50" cy="50" rx="32" ry="11" fill="none" stroke="#61DAFB" stroke-width="2.5"/>
  <!-- Orbit 2 - rotated 60deg -->
  <ellipse cx="50" cy="50" rx="32" ry="11" fill="none" stroke="#61DAFB" stroke-width="2.5" transform="rotate(60 50 50)"/>
  <!-- Orbit 3 - rotated 120deg -->
  <ellipse cx="50" cy="50" rx="32" ry="11" fill="none" stroke="#61DAFB" stroke-width="2.5" transform="rotate(120 50 50)"/>
</svg>
