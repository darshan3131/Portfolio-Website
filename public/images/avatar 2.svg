<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <clipPath id="circle-clip">
      <circle cx="100" cy="100" r="98"/>
    </clipPath>
    <radialGradient id="skin-grad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#c47a50"/>
      <stop offset="100%" stop-color="#8b4e28"/>
    </radialGradient>
    <radialGradient id="bg-grad" cx="50%" cy="80%" r="70%">
      <stop offset="0%" stop-color="#1a1030"/>
      <stop offset="100%" stop-color="#0b080c"/>
    </radialGradient>
    <radialGradient id="shirt-grad" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#8ecfc4"/>
      <stop offset="100%" stop-color="#5fada0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bg-grad)"/>

  <!-- Glow ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>

  <g clip-path="url(#circle-clip)">

    <!-- Shirt / Shoulders -->
    <ellipse cx="100" cy="210" rx="72" ry="50" fill="url(#shirt-grad)"/>
    <!-- Collar shading -->
    <ellipse cx="100" cy="176" rx="28" ry="14" fill="#7bc2b6"/>

    <!-- Neck -->
    <rect x="84" y="152" width="32" height="30" rx="10" fill="url(#skin-grad)"/>
    <!-- Neck shadow -->
    <ellipse cx="100" cy="152" rx="16" ry="5" fill="#7a3e1e" opacity="0.4"/>

    <!-- Head -->
    <ellipse cx="100" cy="108" rx="44" ry="50" fill="url(#skin-grad)"/>

    <!-- Ear left -->
    <ellipse cx="56.5" cy="112" rx="7" ry="10" fill="#b06838"/>
    <ellipse cx="56.5" cy="112" rx="4" ry="7" fill="#9a5a2e"/>

    <!-- Ear right -->
    <ellipse cx="143.5" cy="112" rx="7" ry="10" fill="#b06838"/>
    <ellipse cx="143.5" cy="112" rx="4" ry="7" fill="#9a5a2e"/>

    <!-- Hair base (back) -->
    <ellipse cx="100" cy="78" rx="44" ry="30" fill="#1a1010"/>

    <!-- Forehead curve -->
    <ellipse cx="100" cy="68" rx="38" ry="22" fill="#1a1010"/>

    <!-- Hair styled - swept up crest -->
    <path d="M 62 75 Q 70 45 100 40 Q 130 45 138 75" fill="#1a1010"/>
    <!-- Hair volume top - swept left to right -->
    <path d="M 65 68 Q 80 38 100 38 Q 122 38 140 65 Q 125 42 100 42 Q 75 42 65 68 Z" fill="#2a1a1a"/>
    <!-- Hair highlight -->
    <path d="M 80 48 Q 100 40 118 50" stroke="#3a2a2a" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Side hair left -->
    <path d="M 58 90 Q 56 78 62 68 Q 64 80 60 92 Z" fill="#1a1010"/>
    <!-- Side hair right -->
    <path d="M 142 90 Q 144 78 138 68 Q 136 80 140 92 Z" fill="#1a1010"/>

    <!-- Eyebrows - thick and dark -->
    <!-- Left eyebrow -->
    <path d="M 72 93 Q 83 87 94 91" stroke="#0d0808" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Right eyebrow -->
    <path d="M 106 91 Q 117 87 128 93" stroke="#0d0808" stroke-width="5" fill="none" stroke-linecap="round"/>

    <!-- Eyes -->
    <!-- Left eye white -->
    <ellipse cx="83" cy="103" rx="10" ry="7" fill="#f0e8dc"/>
    <!-- Left iris -->
    <circle cx="83" cy="103" r="6" fill="#2a1a0e"/>
    <!-- Left pupil -->
    <circle cx="83" cy="103" r="3.5" fill="#080408"/>
    <!-- Left eye shine -->
    <circle cx="85" cy="100.5" r="1.5" fill="white" opacity="0.9"/>
    <!-- Left eyelid -->
    <path d="M 73 103 Q 83 96 93 103" stroke="#0d0808" stroke-width="1.5" fill="none"/>

    <!-- Right eye white -->
    <ellipse cx="117" cy="103" rx="10" ry="7" fill="#f0e8dc"/>
    <!-- Right iris -->
    <circle cx="117" cy="103" r="6" fill="#2a1a0e"/>
    <!-- Right pupil -->
    <circle cx="117" cy="103" r="3.5" fill="#080408"/>
    <!-- Right eye shine -->
    <circle cx="119" cy="100.5" r="1.5" fill="white" opacity="0.9"/>
    <!-- Right eyelid -->
    <path d="M 107 103 Q 117 96 127 103" stroke="#0d0808" stroke-width="1.5" fill="none"/>

    <!-- Nose -->
    <path d="M 100 105 Q 96 118 91 122 Q 100 126 109 122 Q 104 118 100 105 Z" fill="#8a4420" opacity="0.7"/>
    <!-- Nose bridge -->
    <path d="M 98 105 Q 96 112 92 120" stroke="#7a3a18" stroke-width="1" fill="none" opacity="0.5"/>
    <!-- Nose nostrils -->
    <ellipse cx="93" cy="121" rx="5" ry="3.5" fill="#7a3818" opacity="0.8"/>
    <ellipse cx="107" cy="121" rx="5" ry="3.5" fill="#7a3818" opacity="0.8"/>

    <!-- Upper lip / Philtrum -->
    <path d="M 92 128 Q 96 125 100 127 Q 104 125 108 128" stroke="#6a3010" stroke-width="1.5" fill="none"/>

    <!-- Mouth - slight smile -->
    <path d="M 90 133 Q 100 140 110 133" stroke="#5a2808" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Mustache -->
    <path d="M 87 128 Q 93 125 100 127 Q 107 125 113 128 Q 107 132 100 131 Q 93 132 87 128 Z" fill="#180c08"/>

    <!-- Chin / Goatee -->
    <path d="M 95 138 Q 100 135 105 138 Q 106 146 100 150 Q 94 146 95 138 Z" fill="#180c08"/>
    <!-- Goatee lower -->
    <path d="M 97 148 Q 100 152 103 148" stroke="#180c08" stroke-width="2" fill="none"/>

    <!-- Cheek warmth -->
    <ellipse cx="74" cy="118" rx="10" ry="7" fill="#c04848" opacity="0.12"/>
    <ellipse cx="126" cy="118" rx="10" ry="7" fill="#c04848" opacity="0.12"/>

  </g>
</svg>
