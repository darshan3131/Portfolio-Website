  <rect x="432" y="218" width="8" height="14" rx="1" fill="#4ade80" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <!-- Labels -->
  <text x="115" y="248" font-family="Arial, sans-serif" font-size="11" fill="#9b7ec7" text-anchor="middle">Input Doc</text>
  <text x="303" y="200" font-family="Arial, sans-serif" font-size="11" fill="#00d4ff" text-anchor="middle">LangChain</text>
  <text x="493" y="302" font-family="Arial, sans-serif" font-size="11" fill="#4ade80" text-anchor="middle">Output Draft</text>
  <!-- Title -->
  <text x="30" y="345" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" fill="white" opacity="0.1">DRAFTER AI</text>
  <text x="30" y="368" font-family="Arial, sans-serif" font-size="14" fill="#00d4ff">GenAI · RAG Pipeline</text>
  <text x="30" y="390" font-family="Arial, sans-serif" font-size="11" fill="#666">Python · LangChain · FastAPI · OpenAI · RAG</text>
