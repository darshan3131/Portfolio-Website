  <circle cx="278" cy="158" r="5" fill="#00d4ff" opacity="0.8"/>
  <circle cx="303" cy="150" r="5" fill="#7b5ea7" opacity="0.8"/>
  <circle cx="328" cy="158" r="5" fill="#00d4ff" opacity="0.8"/>
  <circle cx="290" cy="172" r="5" fill="#7b5ea7" opacity="0.8"/>
  <circle cx="316" cy="172" r="5" fill="#7b5ea7" opacity="0.8"/>
  <line x1="278" y1="158" x2="303" y2="150" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <line x1="303" y1="150" x2="328" y2="158" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <line x1="278" y1="158" x2="290" y2="172" stroke="#7b5ea7" stroke-width="1" opacity="0.5"/>
  <line x1="328" y1="158" x2="316" y2="172" stroke="#7b5ea7" stroke-width="1" opacity="0.5"/>
